name: Sync TanStack Query React v5 Docs

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync upstream docs
        run: pnpm run sync:docs

      - name: Collect sync metadata
        id: sync_meta
        run: |
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          ref="$(node --input-type=module -e 'import { readFileSync } from "node:fs"; const lock = JSON.parse(readFileSync("upstream/lock.json", "utf8")); process.stdout.write(lock.ref ?? "unknown")')"
          echo "synced_ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Collect zh translation status
        id: i18n
        run: |
          status_json="$RUNNER_TEMP/i18n-status.json"
          node .agents/skills/tanstack-query-zh-translation/scripts/i18n-status.mjs --json > "$status_json"
          export I18N_STATUS_PATH="$status_json"
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs'

          const statusPath = process.env.I18N_STATUS_PATH
          const status = JSON.parse(readFileSync(statusPath, 'utf8'))
          const outputPath = process.env.GITHUB_OUTPUT
          const counts = status?.counts ?? {}
          const lists = status?.lists ?? {}

          const missing = Number(counts.missing ?? 0)
          const stale = Number(counts.stale ?? 0)
          const upToDate = Number(counts.upToDate ?? 0)

          const missingPreview =
            Array.isArray(lists.missing) && lists.missing.length > 0
              ? lists.missing.slice(0, 10).join('\n')
              : '(none)'
          const stalePreview =
            Array.isArray(lists.stale) && lists.stale.length > 0
              ? lists.stale
                  .slice(0, 10)
                  .map((entry) =>
                    entry && typeof entry === 'object'
                      ? `${entry.path ?? 'unknown'} (${entry.reason ?? 'unknown'})`
                      : String(entry),
                  )
                  .join('\n')
              : '(none)'

          appendFileSync(outputPath, `missing=${missing}\n`)
          appendFileSync(outputPath, `stale=${stale}\n`)
          appendFileSync(outputPath, `up_to_date=${upToDate}\n`)
          appendFileSync(outputPath, `missing_preview<<EOF\n${missingPreview}\nEOF\n`)
          appendFileSync(outputPath, `stale_preview<<EOF\n${stalePreview}\nEOF\n`)
          NODE

      - name: Astro check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Build site
        run: pnpm run build

      - name: Build pull request body
        run: |
          cat > "$RUNNER_TEMP/sync-pr-body.md" <<EOF
          Automated sync from upstream TanStack Query v5 docs.

          - Synced ref: \`${{ steps.sync_meta.outputs.synced_ref }}\`
          - Sync branch timestamp (UTC): \`${{ steps.sync_meta.outputs.timestamp }}\`
          - Ran \`pnpm run sync:docs\`
          - Ran \`pnpm run check\`
          - Ran \`pnpm run lint\`
          - Ran \`pnpm run build\`

          ## zh translation status

          - upToDate: ${{ steps.i18n.outputs.up_to_date }}
          - missing: ${{ steps.i18n.outputs.missing }}
          - stale: ${{ steps.i18n.outputs.stale }}

          ### missing (first 10)

          \`\`\`
          ${{ steps.i18n.outputs.missing_preview }}
          \`\`\`

          ### stale (first 10)

          \`\`\`
          ${{ steps.i18n.outputs.stale_preview }}
          \`\`\`
          EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: sync TanStack Query React v5 docs'
          branch: chore/sync-query-react-v5-docs-${{ steps.sync_meta.outputs.timestamp }}
          title: 'chore: sync TanStack Query React v5 docs'
          body-path: ${{ runner.temp }}/sync-pr-body.md
