name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Translation integrity check
        run: pnpm run i18n:check

      - name: Upstream update probe (non-blocking)
        run: |
          if pnpm run sync:check; then
            echo "Upstream ref is up to date."
          else
            echo "::notice::A newer upstream v5 tag is available. Run pnpm run sync:docs."
          fi

      - name: Build
        run: pnpm run build
